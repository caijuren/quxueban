<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面宽度测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .info {
            margin: 20px 0;
            padding: 15px;
            background-color: #e8f4f8;
            border-left: 4px solid #3498db;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>页面宽度测试</h1>
        <div class="info">
            <p><strong>当前页面宽度:</strong> <span id="width"></span>px</p>
            <p><strong>当前视口宽度:</strong> <span id="viewport"></span>px</p>
            <p><strong>屏幕宽度:</strong> <span id="screen"></span>px</p>
        </div>
        <button onclick="updateWidth()">更新宽度信息</button>
    </div>
    <script>
        function updateWidth() {
            document.getElementById('width').textContent = document.body.clientWidth;
            document.getElementById('viewport').textContent = window.innerWidth;
            document.getElementById('screen').textContent = screen.width;
        }
        // 初始加载时更新
        updateWidth();
        // 窗口大小改变时更新
        window.addEventListener('resize', updateWidth);
    </script>
</body>
</html>
